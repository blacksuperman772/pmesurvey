<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PMEPQ — Performance Management & Employee Productivity Survey</title>
<style>
  :root{
    --bg:#0f172a; --panel:#ffffff; --ink:#1e293b; --muted:#64748b;
    --brand:#1e3a8a; --brand2:#0e7490; --accent:#f59e0b; --line:#e2e8f0; --ok:#16a34a;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:Inter,Segoe UI,Roboto,system-ui,Arial,sans-serif;background:linear-gradient(160deg,#0f172a,#1e3a8a 60%,#0e7490);color:var(--ink);min-height:100vh;padding:24px}
  .wrap{max-width:840px;margin:0 auto;background:var(--panel);border-radius:18px;box-shadow:0 20px 50px rgba(0,0,0,.25);overflow:hidden}
  header{padding:28px 32px;background:linear-gradient(135deg,var(--brand),var(--brand2));color:#fff}
  header h1{margin:0 0 6px;font-size:1.3rem;line-height:1.35}
  header p{margin:0;opacity:.9;font-size:.9rem}
  .body{padding:24px 32px 36px}
  .intro{background:#f1f5f9;border-left:4px solid var(--accent);padding:14px 16px;border-radius:8px;font-size:.9rem;color:#334155;margin:18px 0}
  .authnote{font-size:.78rem;color:var(--muted);margin:10px 0 22px}
  fieldset{border:1px solid var(--line);border-radius:12px;margin:0 0 22px;padding:18px 20px}
  legend{font-weight:700;color:var(--brand);font-size:1.02rem;padding:0 8px}
  .q{margin:14px 0}
  .q label.qtext{display:block;font-weight:600;margin-bottom:8px;font-size:.95rem}
  .opts{display:flex;flex-wrap:wrap;gap:10px}
  .opts label{display:flex;align-items:center;gap:6px;border:1px solid var(--line);padding:8px 12px;border-radius:999px;cursor:pointer;font-size:.85rem;transition:.15s;background:#f8fafc}
  .opts label:hover{border-color:var(--brand)}
  .opts input{accent-color:var(--brand)}
  .bio-grid{display:grid;grid-template-columns:1fr;gap:16px}
  .bio-item label.b{display:block;font-weight:600;margin-bottom:6px;font-size:.92rem}
  .bio-item select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;font-size:.92rem;background:#f8fafc}
  .btn{display:inline-flex;align-items:center;gap:8px;background:var(--brand);color:#fff;border:none;padding:14px 26px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:.15s}
  .btn:hover{background:#16275e}
  .btn:disabled{opacity:.6;cursor:not-allowed}
  .status{margin-top:16px;font-size:.9rem;font-weight:600}
  .status.ok{color:var(--ok)} .status.err{color:#dc2626}
  .cluster-note{font-size:.8rem;color:var(--muted);margin-top:4px}
  footer{padding:16px 32px;background:#f8fafc;border-top:1px solid var(--line);font-size:.78rem;color:var(--muted);text-align:center}
  a{color:var(--brand)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1 id="title"></h1>
    <p id="subtitle"></p>
  </header>
  <div class="body">
    <div class="intro" id="intro"></div>
    <form id="form">
      <fieldset>
        <legend>Section A — Bio Data</legend>
        <div class="bio-grid" id="bio"></div>
      </fieldset>

      <fieldset>
        <legend>Section B — Responses</legend>
        <div class="cluster-note">Scale: SA = Strongly Agree (5) · A = Agree (4) · UD = Undecided (3) · D = Disagree (2) · SD = Strongly Disagree (1)</div>
        <div id="clusters"></div>
      </fieldset>

      <button class="btn" type="submit" id="submitBtn">Submit Questionnaire</button>
      <div class="status" id="status"></div>
    </form>
  </div>
  <footer>
    Confidential academic research · Oyo State Ministry of Education · <a href="/admin">Admin portal</a>
  </footer>
</div>

<script src="survey-config.js"></script>
<script>
  const bioEl = document.getElementById('bio');
  const clustersEl = document.getElementById('clusters');
  document.getElementById('title').textContent = SURVEY.title;
  document.getElementById('subtitle').textContent = SURVEY.subtitle;
  document.getElementById('intro').textContent = SURVEY.intro;

  // Bio data
  SURVEY.biodata.forEach(b => {
    const d = document.createElement('div');
    d.className = 'bio-item';
    const lbl = document.createElement('label');
    lbl.className = 'b'; lbl.textContent = b.label;
    const sel = document.createElement('select');
    sel.required = true; sel.dataset.id = b.id; sel.name = 'bio_' + b.id;
    const ph = document.createElement('option'); ph.value=''; ph.textContent='— Select —'; ph.disabled=true; ph.selected=true;
    sel.appendChild(ph);
    b.options.forEach(o => { const op=document.createElement('option'); op.value=o; op.textContent=o; sel.appendChild(op); });
    d.appendChild(lbl); d.appendChild(sel); bioEl.appendChild(d);
  });

  // Clusters + questions
  SURVEY.clusters.forEach(c => {
    const fs = document.createElement('div');
    fs.style.marginTop = '18px';
    const h = document.createElement('div');
    h.style.fontWeight='700'; h.style.color='var(--brand2)'; h.style.margin='10px 0 6px';
    h.textContent = c.name;
    fs.appendChild(h);
    c.questions.forEach(q => {
      const qd = document.createElement('div'); qd.className='q';
      const qt = document.createElement('label'); qt.className='qtext'; qt.textContent = q.n + '. ' + q.text;
      const opts = document.createElement('div'); opts.className='opts';
      SURVEY.scale.forEach(s => {
        const lab = document.createElement('label');
        const inp = document.createElement('input');
        inp.type='radio'; inp.name='q'+q.n; inp.value=s.value; inp.required=true;
        lab.appendChild(inp); lab.appendChild(document.createTextNode(s.label));
        opts.appendChild(lab);
      });
      qd.appendChild(qt); qd.appendChild(opts); fs.appendChild(qd);
    });
    clustersEl.appendChild(fs);
  });

  const form = document.getElementById('form');
  const status = document.getElementById('status');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    btn.disabled = true; btn.textContent = 'Submitting…'; status.textContent=''; status.className='status';
    const biodata = {};
    SURVEY.biodata.forEach(b => { biodata[b.id] = form.querySelector('[data-id="'+b.id+'"]').value; });
    const responses = [];
    let missing = false;
    SURVEY.clusters.forEach(c => c.questions.forEach(q => {
      const checked = form.querySelector('input[name="q'+q.n+'"]:checked');
      if (checked) responses.push({ q: q.n, value: parseInt(checked.value,10) });
      else missing = true;
    }));
    if (Object.values(biodata).some(v=>!v) || missing) {
      status.textContent = 'Please answer every question before submitting.';
      status.className='status err'; btn.disabled=false; btn.textContent='Submit Questionnaire'; return;
    }
    try {
      const r = await fetch('/api/submit', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ biodata, responses })
      });
      const data = await r.json();
      if (r.ok && data.ok) {
        status.textContent = '✅ Thank you! Your response has been recorded.';
        status.className='status ok'; form.reset();
        SURVEY.biodata.forEach(b => { form.querySelector('[data-id="'+b.id+'"]').selectedIndex=0; });
      } else {
        status.textContent = '❌ Submission failed: ' + (data.error||'unknown error');
        status.className='status err';
      }
    } catch(err) {
      status.textContent = '❌ Network error: ' + err.message; status.className='status err';
    }
    btn.disabled=false; btn.textContent='Submit Questionnaire';
  });
</script>
</body>
</html>
